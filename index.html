<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTF Image Download</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b0f19; color: #eef; font-family: system-ui, sans-serif; }
    .card { width: min(900px, 92vw); background: #121a2a; border: 1px solid #26324a; border-radius: 18px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
    img { width: 100%; height: auto; border-radius: 14px; display: block; }
    .hint { margin-top: 16px; color: #9fb0d0; line-height: 1.5; }
    a { color: #7fb3ff; }

    /* ── Flame title ── */
    .flame-title {
      text-align: center;
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(
        to top,
        #fff700 0%,
        #ff9900 20%,
        #ff4500 45%,
        #cc1a00 65%,
        #6b0000 85%,
        #1a0000 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(255, 100, 0, 0.9))
              drop-shadow(0 0 20px rgba(255, 60, 0, 0.7))
              drop-shadow(0 0 40px rgba(200, 30, 0, 0.5));
      animation: flicker 2.5s ease-in-out infinite;
      margin: 0 0 4px 0;
    }

    @keyframes flicker {
      0%, 100% {
        filter: drop-shadow(0 0 8px rgba(255, 100, 0, 0.9))
                drop-shadow(0 0 20px rgba(255, 60, 0, 0.7))
                drop-shadow(0 0 40px rgba(200, 30, 0, 0.5));
      }
      30% {
        filter: drop-shadow(0 0 12px rgba(255, 140, 0, 1))
                drop-shadow(0 0 30px rgba(255, 80, 0, 0.85))
                drop-shadow(0 0 55px rgba(220, 40, 0, 0.65));
      }
      60% {
        filter: drop-shadow(0 0 6px rgba(255, 80, 0, 0.8))
                drop-shadow(0 0 16px rgba(255, 40, 0, 0.6))
                drop-shadow(0 0 32px rgba(180, 20, 0, 0.4));
      }
    }

    /* ── Centered subtitle / description ── */
    .card > p {
      text-align: center;
    }

    /* ── Centered download buttons section ── */
    .buttons-grid {
      margin-top: 24px;
      display: grid;
      gap: 28px;
      max-width: 1000px;
    }

    .btn-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .btn-label {
      font: 600 1rem system-ui, sans-serif;
      margin-bottom: 10px;
    }

    .btn-block a img {
      width: min(70vw, 420px);
      height: auto;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,.15);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="flame-title">JARED CTF CHALLENGE</h1>
    <p>Click the image button below to download the file.</p>
    <img class="main" src="geeble.png" alt="jeeble">

    <div class="buttons-grid">
      <div class="btn-block">
        <div class="btn-label">Sample text before the first button:</div>
        <a href="#" aria-label="Download"><img src="blue_download.gif" alt="Download button blue"></a>
      </div>
      <div class="btn-block">
        <div class="btn-label">Sample text before the second button:</div>
        <a href="#" aria-label="Download"><img src="download_yellow.gif" alt="Download button yellow"></a>
      </div>
      <div class="btn-block">
        <div class="btn-label">Sample text before the third button:</div>
        <a href="#" aria-label="Download"><img src="BUTTON-d-2.png" alt="Download button green"></a>
      </div>
    </div>

  </div>
</body>
</html>
