<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTF Image Download</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b0f19; color: #eef; font-family: system-ui, sans-serif; }
    .card { width: min(900px, 92vw); background: #121a2a; border: 1px solid #26324a; border-radius: 18px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.4); }
    img { width: 100%; height: auto; border-radius: 14px; display: block; }
    .hint { margin-top: 16px; color: #9fb0d0; line-height: 1.5; }
    a { color: #7fb3ff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CTF Challenge</h1>
    <p>Click the image button below to download the file.</p>
    <img class="main" src="geeble.png" alt="jeeble">
    <div style="margin-top:24px;display:grid;gap:28px;max-width:1000px">
  <div>
    <div style="font:600 1rem system-ui,sans-serif;margin-bottom:10px">Sample text before the first button:</div>
    <a href="#" aria-label="Download"><img src="blue_download.gif" alt="Download button blue" style="display:block;width:min(70vw,420px);height:auto;border-radius:18px;box-shadow:0 10px 24px rgba(0,0,0,.15)"></a>
  </div>
  <div>
    <div style="font:600 1rem system-ui,sans-serif;margin-bottom:10px">Sample text before the second button:</div>
    <a href="#" aria-label="Download"><img src="download_yellow.gif" alt="Download button yellow" style="display:block;width:min(70vw,420px);height:auto;border-radius:18px;box-shadow:0 10px 24px rgba(0,0,0,.15)"></a>
  </div>
  <div>
    <div style="font:600 1rem system-ui,sans-serif;margin-bottom:10px">Sample text before the third button:</div>
    <a href="#" aria-label="Download"><img src="BUTTON-d-2.png" alt="Download button green" style="display:block;width:min(70vw,420px);height:auto;border-radius:18px;box-shadow:0 10px 24px rgba(0,0,0,.15)"></a>
  </div>
</div>

  </div>


</body>
</html>
