<!doctype html>

<head>

<title>CTF: Cozy Space Critter</title>
<style>
  body { font-family: system-ui, sans-serif; background:#0b0f19; color:#e8eefc; margin:0; display:grid; place-items:center; min-height:100vh; }

  img { width:100%; height:auto; border-radius:14px; display:block; }
  .hint { margin-top:16px; color:#9fb0d0; line-height:1.5; }
  code { background:#0b1020; padding:.15rem .35rem; border-radius:6px; }
</style>
</head>
<body>
  <div class="card">
    <h1>CTF Challenge</h1>
    <p>Something sneaky is hidden in this image.</p>
    <img src="secret_bunchez.png" alt="CTF image" />
    <p class="hint">Hint: think about steganography and inspect the pixels carefully.</p>
  </div>
